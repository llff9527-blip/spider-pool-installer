# ============================================================
# 站群 SEO 系统 — 生产编排(官方公开镜像 + 挂载编译产物,零 token)
# 由 install.sh 下载到 /opt/spider-pool 并 `docker compose -f docker-compose.prod.yml up -d`。
#
# 设计:不构建含源码的自定义镜像(镜像须 private,pull 需 token 会泄漏);
# 改为用**官方公开镜像**挂载 CI 编译的产物启动:
#   - backend:  zenika/alpine-chrome(含 chromium,收录检测/快排可用)挂 ./backend/server
#   - frontend: node:20-alpine 挂 ./frontend(Next standalone) 跑 node server.js
#   - PG/Redis/nginx: 官方公开镜像
# 产物(./backend、./frontend)由 install.sh 从 public Release 免 token 下载解压。
#
# 迁移随后端二进制内置(pkg/migrate),启动自跑幂等迁移;升级=换产物+重启。
# ============================================================

services:
  postgres:
    image: postgres:16
    container_name: seo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: seo_system
      POSTGRES_USER: seo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-seo_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo -d seo_system"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: seo_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: zenika/alpine-chrome:latest
    container_name: seo_backend
    restart: unless-stopped
    init: true
    # 官方 chrome 镜像默认 entrypoint 是 chrome;覆盖为运行挂载的后端二进制
    entrypoint: ["/app/server"]
    user: root
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: seo
      DB_PASSWORD: ${DB_PASSWORD:-seo_pass}
      DB_NAME: seo_system
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      HTTP_PORT: "8080"
      GIN_MODE: release
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-please}
      JWT_EXPIRE_HOURS: "72"
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_URL: ${AI_API_URL:-https://api.deepseek.com}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      RATE_LIMIT_PER_MIN: "120"
      STATIC_ROOT: /app/html
      MIGRATIONS_DIR: /app/database
      CHROME_BIN: /usr/bin/chromium-browser
      VERSION_MANIFEST_URL: ${VERSION_MANIFEST_URL:-https://raw.githubusercontent.com/llff9527-blip/spider-pool-installer/main/version.json}
      UPGRADE_FLAG_PATH: /app/signal/.upgrade-request
    volumes:
      # 后端产物按具体路径挂载(不整体挂 /app:ro,否则无法在其下创建 html/signal 挂载点)
      - ./backend/server:/app/server:ro
      - ./backend/database:/app/database:ro
      - seo_html:/app/html
      - ./signal:/app/signal
    ports:
      - "8095:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  frontend:
    image: node:20-alpine
    container_name: seo_frontend
    restart: unless-stopped
    working_dir: /app
    # Next standalone 产物挂载到 /app,跑 node server.js
    command: ["node", "server.js"]
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app:ro
    ports:
      - "13000:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: seo_nginx
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - seo_html:/html:ro
    ports:
      - "80:80"

volumes:
  pgdata:
  seo_html:
