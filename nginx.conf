# ============================================================
# 站群泛站反向代理 —— 静态优先 + 后端回退
#
# 设计原则：配置里【不出现任何具体域名】，域名全部由后管(数据库)管理。
# 请求处理顺序：
#   1. 先按 Host 找静态文件 /html/<域名>/index.html（生成时已落盘）
#   2. 找不到则回退后端 backend:8080（动态渲染，兼容未静态化的域名）
#
# 静态文件由后端生成时写入共享卷 seo_html，nginx 直接出静态、不经后端和数据库，
# 最快、最耐抓、最适合搜索引擎收录。增删域名无需改此文件/无需 reload。
# 配合 DNS 泛解析(*.yourdomain → 本机IP)即可让所有泛二级域名走 80 端口访问。
# ============================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # 上游：SEO 后端(compose 服务名 backend，容器内端口 8080)
    upstream seo_backend {
        server backend:8080;
    }

    # catch-all：default_server 接管所有未显式匹配的 Host
    server {
        listen      80 default_server;
        server_name _;

        # 静态根：后端落盘的 /html/<域名>/... 挂载于此
        root /html;

        # 后端 AI 生成可能较慢，放宽超时
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 请求首页 / → 先找 /html/<Host>/index.html，找不到回退后端
        location = / {
            try_files /$host/index.html @backend;
        }

        # 其它路径 → 先找 /html/<Host>/<path>，找不到回退后端
        location / {
            try_files /$host$uri /$host$uri/index.html @backend;
        }

        # 后端回退(动态渲染)
        location @backend {
            proxy_pass http://seo_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header User-Agent        $http_user_agent;
        }
    }
}
